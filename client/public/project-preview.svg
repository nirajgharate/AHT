  <rect x="52" y="694" width="1176" height="54" rx="16" fill="rgba(255, 255, 255, 0.72)" stroke="rgba(15, 118, 110, 0.08)" stroke-width="1" style="backdrop-filter: blur(16px);"/>
  <text x="84" y="726" fill="#172554" font-family="Plus Jakarta Sans, Segoe UI, system-ui, sans-serif" font-size="14" font-weight="800">Stored summaries</text>
  
