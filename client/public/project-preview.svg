  <rect x="820" y="458" width="380" height="88" rx="12" fill="rgba(248, 250, 252, 0.6)" stroke="rgba(15, 118, 110, 0.08)"/>
  <rect x="832" y="472" width="310" height="6" rx="3" fill="#cbd5e1"/>
  <rect x="832" y="488" width="340" height="6" rx="3" fill="#cbd5e1"/>
  <rect x="832" y="504" width="220" height="6" rx="3" fill="#cbd5e1"/>
  
