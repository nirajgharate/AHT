  <text x="832" y="572" fill="#0f766e" font-family="Plus Jakarta Sans, Segoe UI, system-ui, sans-serif" font-size="11" font-weight="700">🔍 Sources: dummy.pdf (Chunk 1 | score 0.8972)</text>

