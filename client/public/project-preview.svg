<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AHT Text Summarizer Desktop Preview</title>
  <desc id="desc">A soulful, glassmorphic desktop interface dashboard showing the text editor, upload controls, and RAG ask panels.</desc>
  
  <defs>
    <!-- Background Gradients -->
    <radialGradient id="bgGrad1" cx="0%" cy="0%" r="60%" fx="0%" fy="0%">
      <stop offset="0%" stop-color="#ccfbf1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGrad2" cx="100%" cy="0%" r="50%" fx="100%" fy="0%">
      <stop offset="0%" stop-color="#e0e7ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Premium Button Gradient -->
    <linearGradient id="primaryBtn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="uploadBtn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
  </defs>

  <!-- Base Page Background with Mesh Gradients -->
