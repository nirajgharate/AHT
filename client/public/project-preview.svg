  <text x="84" y="146" fill="#0d9488" font-family="Plus Jakarta Sans, Segoe UI, system-ui, sans-serif" font-size="12" font-weight="800" letter-spacing="0.05em">LANGCHAIN + RAG + MONGODB</text>
  <text x="84" y="188" fill="#172554" font-family="Plus Jakarta Sans, Segoe UI, system-ui, sans-serif" font-size="36" font-weight="800">Text Summarizer</text>
  
