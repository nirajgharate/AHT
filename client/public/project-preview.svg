  <rect x="620" y="132" width="116" height="28" rx="14" fill="rgba(13, 148, 136, 0.08)" stroke="rgba(13, 148, 136, 0.16)"/>
  <text x="638" y="150" fill="#0f766e" font-family="Plus Jakarta Sans, Segoe UI, system-ui, sans-serif" font-size="12" font-weight="700">📖 1,842 chars</text>

