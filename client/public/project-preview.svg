  <circle cx="875" cy="54" r="3.5" fill="#0d9488"/>
  <text x="888" y="59" fill="#0f766e" font-family="Plus Jakarta Sans, Segoe UI, system-ui, sans-serif" font-size="12" font-weight="700">Uploader</text>

  <rect x="974" y="37" width="46" height="34" rx="17" fill="#ffffff" stroke="rgba(15, 118, 110, 0.08)"/>
  <path d="M997 46C992.58 46 989 49.58 989 54C989 58.42 992.58 62 997 62C1001.42 62 1005 58.42 1005 54C1005 49.58 1001.42 46 997 46ZM997 60C993.69 60 991 57.31 991 54C991 50.69 993.69 48 997 48C1000.31 48 1003 50.69 1003 54C1003 57.31 1000.31 60 997 60Z" fill="#172554"/>
  <path d="M997 50V54L1000 56" stroke="#172554" stroke-width="1.5" stroke-linecap="round"/>

