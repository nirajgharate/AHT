  <text x="656" y="59" fill="#64748b" font-family="Plus Jakarta Sans, Segoe UI, system-ui, sans-serif" font-size="13" font-weight="600">RAG Q&amp;A</text>
  <text x="750" y="59" fill="#64748b" font-family="Plus Jakarta Sans, Segoe UI, system-ui, sans-serif" font-size="13" font-weight="600">History</text>

