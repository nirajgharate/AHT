  <path d="M818 392C818 385.37 823.37 380 830 380C836.63 380 842 385.37 842 392C842 398.63 836.63 404 830 404C823.37 404 818 398.63 818 392Z" fill="rgba(13, 148, 136, 0.08)" stroke="#0d9488" stroke-width="1"/>
