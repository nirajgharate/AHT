  <rect x="922" y="412" width="210" height="34" rx="10" fill="#ffffff" stroke="rgba(15, 118, 110, 0.15)"/>
  <text x="934" y="433" fill="#94a3b8" font-family="Plus Jakarta Sans, Segoe UI, system-ui, sans-serif" font-size="12">Ask follow-up query...</text>
  <rect x="1140" y="412" width="60" height="34" rx="10" fill="#172554"/>
  <text x="1158" y="433" fill="#ffffff" font-family="Plus Jakarta Sans, Segoe UI, system-ui, sans-serif" font-size="12" font-weight="800">Ask</text>

