  <rect x="240" y="24" width="800" height="60" rx="30" fill="rgba(255, 255, 255, 0.72)" stroke="rgba(15, 118, 110, 0.08)" stroke-width="1.5" style="backdrop-filter: blur(16px);"/>
  
  <!-- Navbar Brand -->
  <rect x="272" y="38" width="32" height="32" rx="10" fill="rgba(13, 148, 136, 0.08)" stroke="rgba(13, 148, 136, 0.2)" stroke-width="1"/>
  <path d="M288 44L290.5 50.8L297 53L290.5 55.2L288 62L285.5 55.2L279 53L285.5 50.8L288 44Z" fill="#0d9488"/>
  <text x="314" y="60" fill="#172554" font-family="Plus Jakarta Sans, Segoe UI, system-ui, sans-serif" font-size="16" font-weight="800">AHT Summarizer</text>

